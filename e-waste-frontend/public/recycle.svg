<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main Green Gradient for the Plastic Look -->
    <linearGradient id="mainGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="50%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>

    <!-- Highlight/Gloss Effect Gradient -->
    <radialGradient id="glossHighlight" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="white" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="white" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>

    <!-- Filter for soft drop shadow underneath the symbol -->
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- The entire symbol is grouped and given a slight shadow -->
  <g transform="translate(200, 200) scale(1.5)" filter="url(#softShadow)">
    <g transform="translate(-130, -130)">
      
      <!-- Arrow 1 (Top Left) -->
      <!-- Path starts at the lower-right tip and goes counter-clockwise -->
      <path id="arrow1" 
        fill="url(#mainGreen)" 
        stroke="#1B5E20" 
        stroke-width="2"
        d="M 120 170 
           C 120 170, 100 130, 70 110 
           L 70 170 
           C 70 170, 70 200, 100 210
           L 150 200
           C 150 200, 120 190, 120 170 Z"
      />
      <!-- Gloss for Arrow 1 -->
      <path 
        fill="url(#glossHighlight)" 
        opacity="0.7" 
        d="M 120 170 
           C 115 150, 95 120, 75 115
           L 80 120
           C 100 135, 115 160, 120 170 Z"
      />

      <!-- Arrow 2 (Top Right) -->
      <g transform="rotate(120, 130, 130)">
        <path id="arrow2" 
          fill="url(#mainGreen)" 
          stroke="#1B5E20" 
          stroke-width="2"
          d="M 120 170 
             C 120 170, 100 130, 70 110 
             L 70 170 
             C 70 170, 70 200, 100 210
             L 150 200
             C 150 200, 120 190, 120 170 Z"
        />
        <!-- Gloss for Arrow 2 -->
        <path 
          fill="url(#glossHighlight)" 
          opacity="0.7" 
          d="M 120 170 
             C 115 150, 95 120, 75 115
             L 80 120
             C 100 135, 115 160, 120 170 Z"
        />
      </g>
      
      <!-- Arrow 3 (Bottom) -->
      <g transform="rotate(240, 130, 130)">
        <path id="arrow3" 
          fill="url(#mainGreen)" 
          stroke="#1B5E20" 
          stroke-width="2"
          d="M 120 170 
             C 120 170, 100 130, 70 110 
             L 70 170 
             C 70 170, 70 200, 100 210
             L 150 200
             C 150 200, 120 190, 120 170 Z"
        />
        <!-- Gloss for Arrow 3 -->
        <path 
          fill="url(#glossHighlight)" 
          opacity="0.7" 
          d="M 120 170 
             C 115 150, 95 120, 75 115
             L 80 120
             C 100 135, 115 160, 120 170 Z"
        />
      </g>
      
    </g>
  </g>
</svg>